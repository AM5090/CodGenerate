# Connect DB
spring.datasource.url=jdbc:postgresql://localhost:5433/cg_app
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Flyway
#spring.flyway.enabled=true
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=filesystem:src/main/resources/db/migration

# JWT Settings
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

otp.file.directory=./otp-codes

# Logging levels
logging.level.com.example.CodGenerate=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n

# Log to file
logging.file.name=logs/application.log